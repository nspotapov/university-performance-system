services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.10
    ports:
      - 80:80
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    env_file:
      - path: backend/.env
        required: true
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      VIRTUAL_HOST: localhost
      VIRTUAL_PATH: /api
      VIRTUAL_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: &logging-default
      driver: "json-file"
      options:
        max-file: "1"
        max-size: "10m"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: frontend
      dockerfile: .deploy/Dockerfile
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      VIRTUAL_HOST: localhost
      VIRTUAL_PATH: /
      VIRTUAL_PORT: 80
    restart: unless-stopped
    logging: *logging-default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s

  db:
    image: postgres:17.9-alpine3.23
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U${POSTGRES_USER:-app}", "-d${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging: *logging-default

  redis:
    image: redis:8.2.1
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
    restart: unless-stopped
    logging: *logging-default

  mailhog:
    image: mailhog/mailhog
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
    ports:
      - 8025:8025
    restart: unless-stopped
    logging: *logging-default

  redisinsight:
    image: redis/redisinsight
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      RI_REDIS_HOST: redis
    ports:
      - 5540:5540
    volumes:
      - redisinsight_data:/data
    logging: *logging-default

  adminer:
    image: adminer
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default

volumes:
  postgres_data:
  redisinsight_data:
