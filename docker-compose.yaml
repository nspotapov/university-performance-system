services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.10
    ports:
      - 127.0.0.1:80:80
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - 127.0.0.1:8000:8000
    env_file:
      - path: backend/.env
        required: true
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      VIRTUAL_HOST: localhost
      VIRTUAL_PATH: /api
      VIRTUAL_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    logging: &logging-default
      driver: "json-file"
      options:
        max-file: "1"
        max-size: "10m"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://127.0.0.1:8000/api/common/healthcheck" ]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: frontend
      dockerfile: .deploy/Dockerfile
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      VIRTUAL_HOST: localhost
      VIRTUAL_PATH: /
      VIRTUAL_PORT: 80
    restart: unless-stopped
    logging: *logging-default
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/" ]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s

  db:
    image: mysql:8.0-bookworm
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USERNAME:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-supersecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-supersecret}", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging: *logging-default

  redis:
    image: redis:8.2.1
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
    restart: unless-stopped
    logging: *logging-default

  mailhog:
    image: mailhog/mailhog
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
    ports:
      - 127.0.0.1:8025:8025
    restart: unless-stopped
    logging: *logging-default

  redisinsight:
    image: redis/redisinsight
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
      RI_REDIS_HOST: redis
    ports:
      - 127.0.0.1:5540:5540
    volumes:
      - redisinsight_data:/data
    logging: *logging-default

  adminer:
    image: adminer
    environment:
      TZ: ${TZ:-Europe/Ulyanovsk}
    ports:
      - 127.0.0.1:8080:8080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default

volumes:
  mysql_data:
  redisinsight_data:
